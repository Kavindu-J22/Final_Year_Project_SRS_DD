input {
  file {
    path => "/usr/share/logstash/data/*.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "bots_log"
  }
}

filter {
  # Parse timestamp - critical for timeline
  date {
    match => [ "_time", "UNIX", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
    target => "@timestamp"
  }

  # Normalize Source Type
  if [sourcetype] =~ "stream:http" {
    mutate { add_field => { "event_category" => "Network" } }
  } else if [sourcetype] =~ "WinEventLog" {
    mutate { add_field => { "event_category" => "Endpoint" } }
  } else if [sourcetype] =~ "iis" {
    mutate { add_field => { "event_category" => "Web" } }
  } else {
    mutate { add_field => { "event_category" => "Other" } }
  }

  # Normalize common fields for correlation
  mutate {
    rename => { "c-ip" => "src_ip" }
    rename => { "s-ip" => "dest_ip" }
    rename => { "cs-method" => "http_method" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "forensic-timeline-v1"
  }
  stdout { codec => rubydebug }
}
